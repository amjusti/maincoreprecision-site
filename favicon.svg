<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#1C1F24"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#CACDD2" stroke-width="1"/>

  <!-- Cardinal ticks N/S/E/W (on ring, pointing inward) -->
  <g stroke="#CACDD2" stroke-width="1" stroke-linecap="round">
    <line x1="16"  y1="2.5"  x2="16"  y2="5.5"/>
    <line x1="16"  y1="29.5" x2="16"  y2="26.5"/>
    <line x1="29.5" y1="16"  x2="26.5" y2="16"/>
    <line x1="2.5"  y1="16"  x2="5.5"  y2="16"/>
  </g>

  <!-- Hexagon core — pointy-top, R=6 -->
  <polygon
    points="16,10 21.2,13 21.2,19 16,22 10.8,19 10.8,13"
    fill="none" stroke="#CACDD2" stroke-width="1"/>

  <!-- Orange accent edges: top edge + right-vertical edge -->
  <line x1="16"   y1="10" x2="21.2" y2="13" stroke="#E06E2A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21.2" y1="13" x2="21.2" y2="19" stroke="#E06E2A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Orange crosshair ticks N/S/E/W (between ring and hex) -->
  <g stroke="#E06E2A" stroke-width="1" stroke-linecap="round">
    <line x1="16"  y1="6"   x2="16"  y2="8.5"/>
    <line x1="16"  y1="26"  x2="16"  y2="23.5"/>
    <line x1="26"  y1="16"  x2="23.5" y2="16"/>
    <line x1="6"   y1="16"  x2="8.5"  y2="16"/>
  </g>

  <!-- Center dot with white pupil -->
  <circle cx="16" cy="16" r="2.5" fill="#E06E2A"/>
  <circle cx="16" cy="16" r="1"   fill="#fff"/>
</svg>
